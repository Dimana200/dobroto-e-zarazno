<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AuctioLite – Наддаване</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --bg: #0d0d0d;
  --surface: #161616;
  --surface2: #1f1f1f;
  --border: #2a2a2a;
  --gold: #c9a84c;
  --gold-light: #e8c96d;
  --red: #e05252;
  --green: #4caf7d;
  --text: #f0ede8;
  --muted: #888;
  --radius: 12px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border); background: var(--surface); position: sticky; top: 0; z-index: 100; }
.logo { font-family: Georgia, serif; font-size: 20px; color: var(--gold); }
.header-user { display: flex; align-items: center; gap: 10px; font-size: 13px; }
.live-dot { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; color: var(--green); font-weight: 500; }
.live-dot::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 1.5s ease-in-out infinite; }
@keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:.4; transform:scale(.8); } }

main { flex: 1; padding: 20px 16px; max-width: 540px; margin: 0 auto; width: 100%; }

/* AUTH */
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; margin-bottom: 16px; }
.card-title { font-size: 12px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--muted); margin-bottom: 14px; font-weight: 600; }
.tabs { display: flex; gap: 4px; margin-bottom: 14px; }
.tab { flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: 8px; background: transparent; color: var(--muted); font-family: system-ui, -apple-system, sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.18s; }
.tab.active { background: var(--surface2); color: var(--text); border-color: var(--gold); }

input, textarea { width: 100%; padding: 12px 14px; margin-top: 8px; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; font-family: system-ui, -apple-system, sans-serif; font-size: 14px; color: var(--text); transition: border-color 0.2s; outline: none; }
input:focus, textarea:focus { border-color: var(--gold); }
input::placeholder, textarea::placeholder { color: var(--muted); }
textarea { resize: vertical; min-height: 80px; }

.btn { display: block; width: 100%; padding: 13px 20px; border: none; border-radius: 10px; font-family: system-ui, -apple-system, sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.18s; margin-top: 10px; }
.btn:active { transform: scale(0.97); }
.btn-gold { background: var(--gold); color: #0d0d0d; }
.btn-gold:hover { background: var(--gold-light); }
.btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

.msg { font-size: 13px; text-align: center; padding: 8px 0; min-height: 22px; color: var(--muted); }
.msg.error { color: var(--red); }
.msg.success { color: var(--green); }

.waiting-box { text-align: center; padding: 30px 20px; }
.waiting-icon { font-size: 48px; margin-bottom: 12px; }
.waiting-box h3 { font-family: Georgia, serif; font-size: 20px; margin-bottom: 8px; }
.waiting-box p { color: var(--muted); font-size: 14px; line-height: 1.6; }

/* PRODUCTS LIST */
.section-title { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); font-weight: 600; margin-bottom: 14px; }
.product-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; margin-bottom: 14px; cursor: pointer; transition: border-color 0.2s; }
.product-card:hover { border-color: var(--gold); }
.product-card.active { border-color: var(--gold); border-width: 2px; }
.product-card-body { padding: 16px 18px; }
.product-card-title { font-family: Georgia, serif; font-size: 18px; margin-bottom: 4px; }
.product-card-desc { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
.product-card-footer { background: linear-gradient(135deg, #1a1600, #1f1a00); border-top: 1px solid #2e2500; padding: 12px 18px; display: flex; align-items: center; justify-content: space-between; }
.price-big { font-family: Georgia, serif; font-size: 26px; color: var(--gold); }
.bids-small { font-size: 12px; color: var(--muted); text-align: right; }
.bids-small strong { display: block; font-size: 18px; color: var(--text); }

/* BID PANEL */
.bid-panel { background: var(--surface); border: 1px solid var(--gold); border-radius: 14px; padding: 18px; margin-bottom: 14px; }
.bid-panel-title { font-family: Georgia, serif; font-size: 16px; color: var(--gold); margin-bottom: 12px; }
.bid-row { display: flex; gap: 10px; align-items: stretch; }
.bid-row input { flex: 1; margin-top: 0; font-size: 16px; font-weight: 600; text-align: center; }
.bid-row .btn { width: auto; padding: 0 20px; margin-top: 0; white-space: nowrap; }

/* BID HISTORY */
.bid-list { display: flex; flex-direction: column; gap: 8px; max-height: 220px; overflow-y: auto; margin-top: 12px; }
.bid-item { display: flex; justify-content: space-between; align-items: center; padding: 9px 12px; background: var(--surface2); border-radius: 8px; font-size: 13px; }
.bid-item.mine { border-left: 2px solid var(--gold); }
.bid-item .name { color: var(--text); font-weight: 500; }
.bid-item .amount { color: var(--gold); font-weight: 600; }
.bid-item .time { color: var(--muted); font-size: 11px; }

.hidden { display: none !important; }
footer { text-align: center; padding: 20px; font-size: 12px; color: #444; border-top: 1px solid var(--border); }
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<header>
  <div class="logo">✦ AuctioLite</div>
  <div class="header-user">
    <span class="live-dot">НА ЖИВО</span>
    <span id="header-name" class="hidden" style="color:var(--text);font-weight:500;"></span>
    <button id="header-logout" class="hidden" onclick="logout()" style="background:none;border:1px solid #333;color:#888;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:12px;">Изход</button>
  </div>
</header>

<main>

  <!-- AUTH -->
  <div id="auth-section">
    <div class="tabs">
      <button class="tab active" onclick="showTab('login')">Вход</button>
      <button class="tab" onclick="showTab('reg')">Регистрация</button>
    </div>
    <div id="tab-login" class="card">
      <div class="card-title">Влезте в профила си</div>
      <input id="l-email" type="email" placeholder="Имейл адрес">
      <input id="l-pass" type="password" placeholder="Парола">
      <button class="btn btn-gold" onclick="signIn()">Вход →</button>
    </div>
    <div id="tab-reg" class="card hidden">
      <div class="card-title">Нов акаунт</div>
      <input id="r-name" placeholder="Пълно име *">
      <input id="r-nick" placeholder="Псевдоним * (показва се публично)">
      <input id="r-email" type="email" placeholder="Имейл адрес *">
      <input id="r-phone" type="tel" placeholder="Телефонен номер *">
      <input id="r-pass" type="password" placeholder="Парола * (мин. 6 символа)">
      <textarea id="r-mot" placeholder="Защо искате да участвате в търга? *"></textarea>
      <button class="btn btn-gold" onclick="signUp()">Създай акаунт →</button>
    </div>
    <p class="msg" id="auth-msg"></p>
  </div>

  <!-- WAITING -->
  <div id="waiting-section" class="card hidden">
    <div class="waiting-box">
      <div class="waiting-icon">⏳</div>
      <h3>Чака одобрение</h3>
      <p>Вашата заявка е изпратена.<br>Администраторът ще ви одобри скоро.</p>
    </div>
    <button class="btn btn-ghost" onclick="logout()">Изход</button>
  </div>

  <!-- PRODUCTS -->
  <div id="products-section" class="hidden">
    <div class="section-title">Активни търгове</div>
    <div id="products-list"></div>

    <!-- BID PANEL (показва се при избор на продукт) -->
    <div id="bid-panel" class="bid-panel hidden">
      <div class="bid-panel-title" id="bid-panel-title">Наддавай</div>
      <div class="bid-row">
        <input id="bid-amt" type="number" placeholder="Сума в лв." min="0" step="1">
        <button class="btn btn-gold" onclick="placeBid()">Наддай ✦</button>
      </div>
      <p class="msg" id="bid-msg"></p>
      <div class="bid-list" id="bid-list"></div>
    </div>
  </div>

</main>

<footer>AuctioLite &copy; 2025 · Сигурна платформа за наддаване</footer>

<script>
const SUPABASE_URL = "https://uanpswocsbhpeoavcaus.supabase.co";
const SUPABASE_KEY = "sb_publishable_wgZTbaJ-zhv5J5diU6nfOw_8M-CLe55";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUserId = null;
let selectedAuctionId = null;
let allProducts = [];
let realtimeChannel = null;

const $ = id => document.getElementById(id);

function showMsg(id, text, type = '') {
  const el = $(id);
  el.className = 'msg ' + type;
  el.textContent = text;
  if (type) setTimeout(() => { el.textContent = ''; el.className = 'msg'; }, 4000);
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  $('tab-login').classList.add('hidden');
  $('tab-reg').classList.add('hidden');
  $('tab-' + tab).classList.remove('hidden');
  event.target.classList.add('active');
}

function showSection(id) {
  ['auth-section','waiting-section','products-section'].forEach(s => $(s).classList.add('hidden'));
  $(id).classList.remove('hidden');
}

async function handleEmailRedirect() {
  if (!location.hash.includes('access_token')) return;
  const params = new URLSearchParams(location.hash.substring(1));
  const access_token = params.get('access_token');
  const refresh_token = params.get('refresh_token');
  if (access_token) {
    await sb.auth.setSession({ access_token, refresh_token });
    history.replaceState({}, document.title, '/');
  }
}

async function init() {
  await handleEmailRedirect();
  const { data: { user } } = await sb.auth.getUser();

  if (!user) { showSection('auth-section'); return; }
  currentUserId = user.id;

  const { data: profile } = await sb.from('auction_profiles').select('*').eq('id', user.id).maybeSingle();
  if (!profile) { showSection('auth-section'); showMsg('auth-msg', 'Регистрирайте се за достъп.'); return; }

  $('header-name').textContent = profile.nickname || profile.full_name;
  $('header-name').classList.remove('hidden');
  $('header-logout').classList.remove('hidden');

  if (!profile.is_verified) { showSection('waiting-section'); return; }

  showSection('products-section');
  loadProducts();
  subscribeRealtime();
}

async function loadProducts() {
  const { data } = await sb.from('auction_items').select('*').order('created_at', { ascending: false });
  if (!data || !data.length) {
    $('products-list').innerHTML = '<div style="text-align:center;padding:40px 0;color:var(--muted);">Няма активни търгове</div>';
    return;
  }
  allProducts = data;
  renderProducts();
}

function renderProducts() {
  $('products-list').innerHTML = allProducts.map(p => `
    <div class="product-card ${selectedAuctionId === p.id ? 'active' : ''}" onclick="selectProduct('${p.id}')">
      ${p.image_url ? `<img src="${p.image_url}" style="width:100%;height:200px;object-fit:cover;display:block;border-radius:14px 14px 0 0;">` : ''}
      <div class="product-card-body">
        <div class="product-card-title">${p.title}</div>
        ${p.description ? `<div class="product-card-desc">${p.description}</div>` : ''}
      </div>
      <div class="product-card-footer">
        <div>
          <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;">Текуща цена</div>
          <div class="price-big" id="price-${p.id}">${Number(p.current_price).toLocaleString('bg-BG')} лв.</div>
        </div>
        <div class="bids-small">
          <div>Наддавания</div>
          <strong id="bids-count-${p.id}">—</strong>
        </div>
      </div>
    </div>
  `).join('');

  // load bid counts
  allProducts.forEach(p => loadBidCount(p.id));
}

async function loadBidCount(id) {
  const { data } = await sb.from('bids').select('id').eq('auction_id', id);
  const el = $('bids-count-' + id);
  if (el) el.textContent = data ? data.length : 0;
}

async function selectProduct(id) {
  selectedAuctionId = id;
  renderProducts();

  const product = allProducts.find(p => p.id === id);
  $('bid-panel-title').textContent = `Наддавай за: ${product?.title || ''}`;
  $('bid-panel').classList.remove('hidden');
  $('bid-amt').value = '';
  $('bid-msg').textContent = '';

  loadBidHistory();
  $('bid-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

async function placeBid() {
  if (!selectedAuctionId) return;
  const val = parseFloat($('bid-amt').value);
  if (!val || val <= 0) { showMsg('bid-msg', 'Въведете валидна сума!', 'error'); return; }

  showMsg('bid-msg', 'Изпращане...');

  const { error } = await sb.rpc('place_bid', { p_auction: selectedAuctionId, p_amount: val });

  if (error) {
    showMsg('bid-msg', error.message, 'error');
  } else {
    $('bid-amt').value = '';
    showMsg('bid-msg', '✓ Наддаването е регистрирано!', 'success');
    const { data } = await sb.from('auction_items').select('*').eq('id', selectedAuctionId).single();
    if (data) {
      allProducts = allProducts.map(p => p.id === data.id ? data : p);
      renderProducts();
    }
    loadBidHistory();
  }
}

async function loadBidHistory() {
  if (!selectedAuctionId) return;
  const { data: bids } = await sb
    .from('bids')
    .select('amount, created_at, user_id, auction_profiles(full_name, nickname)')
    .eq('auction_id', selectedAuctionId)
    .order('created_at', { ascending: false })
    .limit(30);

  const list = $('bid-list');
  if (!bids || !bids.length) {
    list.innerHTML = '<div style="color:var(--muted);font-size:13px;text-align:center;padding:16px 0;">Все още няма наддавания</div>';
    return;
  }

  list.innerHTML = bids.map(b => {
    const isMine = b.user_id === currentUserId;
    const name = b.auction_profiles?.nickname || b.auction_profiles?.full_name || 'Участник';
    const time = new Date(b.created_at).toLocaleTimeString('bg-BG', { hour: '2-digit', minute: '2-digit' });
    return `
      <div class="bid-item ${isMine ? 'mine' : ''}">
        <div>
          <div class="name">${isMine ? '★ ' : ''}${name}</div>
          <div class="time">${time}</div>
        </div>
        <div class="amount">${Number(b.amount).toLocaleString('bg-BG')} лв.</div>
      </div>`;
  }).join('');
}

function subscribeRealtime() {
  realtimeChannel = sb.channel('auction-live-all')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'auction_items' }, payload => {
      if (payload.new) {
        allProducts = allProducts.map(p => p.id === payload.new.id ? { ...p, ...payload.new } : p);
        renderProducts();
        const priceEl = $('price-' + payload.new.id);
        if (priceEl) priceEl.textContent = Number(payload.new.current_price).toLocaleString('bg-BG') + ' лв.';
      }
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'bids' }, payload => {
      if (payload.new.auction_id === selectedAuctionId) loadBidHistory();
      loadBidCount(payload.new.auction_id);
    })
    .subscribe();
}

async function signUp() {
  const name = $('r-name').value.trim();
  const nick = $('r-nick').value.trim();
  const email = $('r-email').value.trim();
  const phone = $('r-phone').value.trim();
  const pass = $('r-pass').value;
  const mot = $('r-mot').value.trim();

  if (!name || !nick || !email || !phone || !pass || !mot) { showMsg('auth-msg', 'Всички полета са задължителни!', 'error'); return; }
  if (pass.length < 6) { showMsg('auth-msg', 'Паролата трябва да е мин. 6 символа!', 'error'); return; }

  showMsg('auth-msg', 'Регистрация...');
  const { data, error } = await sb.auth.signUp({ email, password: pass, options: { emailRedirectTo: location.origin } });
  if (error) { showMsg('auth-msg', error.message, 'error'); return; }

  await sb.from('auction_profiles').insert([{ id: data.user.id, full_name: name, nickname: nick, phone, motivation: mot }]);
  showMsg('auth-msg', '✓ Регистрацията е успешна! Изчакайте одобрение.', 'success');
}

async function signIn() {
  const email = $('l-email').value.trim();
  const pass = $('l-pass').value;
  if (!email || !pass) { showMsg('auth-msg', 'Въведете имейл и парола!', 'error'); return; }
  showMsg('auth-msg', 'Влизане...');
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) { showMsg('auth-msg', 'Грешен имейл или парола!', 'error'); return; }
  location.reload();
}

async function logout() {
  await sb.auth.signOut();
  location.reload();
}

init();
</script>
</body>
</html>
